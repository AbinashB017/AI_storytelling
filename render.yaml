services:
  - type: web
    name: scenova-api
    runtime: python
    region: oregon
    plan: free

    # ── Python version (MUST be 3.11 — pydantic-core has no 3.14 wheels) ──────
    pythonVersion: "3.11.9"

    # ── Build ──────────────────────────────────────────────────────────────────
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt

    # ── Start ─────────────────────────────────────────────────────────────────
    startCommand: PYTHONPATH=src uvicorn app.main:app --host 0.0.0.0 --port $PORT

    # ── Health Check ──────────────────────────────────────────────────────────
    healthCheckPath: /health

    # ── Environment Variables ─────────────────────────────────────────────────
    envVars:
      - key: GROQ_API_KEY_1
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_API_KEY_3
        sync: false
      - key: MINIMAX_API_KEY
        sync: false
      - key: MINIMAX_GROUP_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
