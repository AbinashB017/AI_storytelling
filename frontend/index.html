<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Storyboard Generator</title>
  <meta name="description" content="Transform your narrative into a cinematic AI-generated visual storyboard." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Hero / Input Section ─────────────────────────────────────────── -->
  <section id="input-section" class="input-section">
    <div class="hero-bg">
      <div class="orb orb-1"></div>
      <div class="orb orb-2"></div>
      <div class="orb orb-3"></div>
    </div>
    <div class="input-card">
      <div class="brand">
        <div class="brand-icon-wrap">🎬</div>
        <h1 class="brand-title">AI Storyboard <span class="brand-accent">Generator</span></h1>
        <p class="brand-sub">Transform your story into a cinematic visual experience</p>
      </div>

      <div class="form-group">
        <label for="narrative-input" class="form-label">Your Narrative</label>
        <textarea
          id="narrative-input"
          class="form-textarea"
          rows="5"
          placeholder="Write 3–5 sentences of your story here…&#10;&#10;Example: A young engineer loses his job and discovers a hidden talent for painting. He struggles through rejection but keeps creating. One day his art catches the eye of a famous gallery owner."
          maxlength="2000"
        ></textarea>
        <div class="char-count"><span id="char-count">0</span> / 2000</div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label for="style-select" class="form-label">Visual Style</label>
          <select id="style-select" class="form-select">
            <option value="cinematic">🎥 Cinematic</option>
            <option value="realistic">📷 Realistic</option>
            <option value="anime">✨ Anime</option>
            <option value="oil painting">🎨 Oil Painting</option>
            <option value="sketch">✏️ Sketch</option>
          </select>
        </div>
        <div class="form-group half align-end">
          <button id="generate-btn" class="generate-btn" onclick="generateStoryboard()">
            <span class="btn-icon">✦</span>
            <span id="btn-text">Generate Storyboard</span>
            <span id="btn-loader" class="btn-loader hidden"></span>
          </button>
        </div>
      </div>

      <div id="error-msg" class="error-msg hidden"></div>
    </div>
  </section>

  <!-- ── Storyboard Section ────────────────────────────────────────────── -->
  <section id="storyboard-section" class="storyboard-section hidden">

    <!-- Top Bar -->
    <header class="top-bar">
      <button class="tb-btn" onclick="backToInput()" title="Back">
        <span>←</span> Back
      </button>

      <div class="tb-center">
        <span class="story-title" id="story-title">Your Storyboard</span>
      </div>

      <div class="tb-actions">
        <button class="tb-btn" id="view-toggle-btn" onclick="toggleView()" title="Switch view">
          ⊞ Grid View
        </button>
        <button class="tb-btn accent" id="download-btn" onclick="downloadStoryboard()" title="Download">
          ↓ Download
        </button>
      </div>
    </header>

    <!-- ── SLIDESHOW VIEW ─────────────────────────────────────────────── -->
    <div id="slideshow-view" class="view-container">

      <div class="slideshow-controls">
        <span class="slide-counter">
          <span id="current-slide-num">1</span> / <span id="total-slides">0</span>
        </span>
        <button class="ctrl-btn" id="autoplay-btn" onclick="toggleAutoplay()">▶ Autoplay</button>
      </div>

      <div class="slide-stage" id="slide-stage"
           onmouseenter="pauseAutoplay()"
           onmouseleave="resumeAutoplay()">
        <div id="slide-track" class="slide-track">
          <!-- Slides injected here -->
        </div>

        <button class="arrow-btn left" id="prev-btn" onclick="prevSlide()">‹</button>
        <button class="arrow-btn right" id="next-btn" onclick="nextSlide()">›</button>
      </div>

      <div class="slide-meta">
        <div class="slide-headline" id="slide-headline"></div>
        <p class="slide-caption" id="slide-caption"></p>
      </div>

      <div class="dot-row" id="dot-row"></div>

    </div>

    <!-- ── GRID VIEW ─────────────────────────────────────────────────── -->
    <div id="grid-view" class="view-container hidden">
      <div class="panel-grid" id="panel-grid">
        <!-- Cards injected here -->
      </div>
    </div>

  </section>

  <!-- ── Loading Overlay ──────────────────────────────────────────────── -->
  <div id="loading-overlay" class="loading-overlay hidden">
    <div class="loading-box">
      <div class="loading-ring">
        <div></div><div></div><div></div><div></div>
      </div>
      <p class="loading-title">Crafting your storyboard…</p>
      <div class="loading-steps">
        <div class="loading-step" id="step-1">🧠 Understanding the story</div>
        <div class="loading-step" id="step-2">🎭 Segmenting scenes</div>
        <div class="loading-step" id="step-3">✍️  Enriching descriptions</div>
        <div class="loading-step" id="step-4">🎨 Generating images</div>
        <div class="loading-step" id="step-5">✅ Assembling storyboard</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
